<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Flappy Bird</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            /* Full screen layout */
            background-color: #70c5ce; /* Sky blue */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%; /* Fill computer screen */
            background-color: #70c5ce; /* Sky blue */
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(112, 197, 206, 0.4); /* tinted sky blue */
            backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* Start Screen */
        .title {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            -webkit-text-stroke: 2px #000;
        }

        .play-btn {
            padding: 1rem 3.5rem;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            background: #e45f1b; /* Orange */
            border: 3px solid #ffffff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #b3430c;
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: inherit;
        }

        .play-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #b3430c;
        }

        /* In-Game Score */
        #hud {
            position: absolute;
            top: 10%;
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffffff;
            -webkit-text-stroke: 3px #000;
            text-shadow: 0 4px 5px rgba(0, 0, 0, 0.3);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #hud.active {
            opacity: 1;
        }

        /* Game Over Screen */
        .panel {
            background: #ded895; /* yellowish UI panel from original */
            border: 4px solid #543847;
            border-radius: 12px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .screen.active .panel {
            transform: translateY(0);
        }

        .game-over-title {
            font-size: 3rem;
            color: #ffffff;
            -webkit-text-stroke: 2px #000;
            font-weight: 900;
            text-shadow: 0 4px 5px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .score-box {
            display: flex;
            justify-content: space-between;
            gap: 3rem;
            background: #cdb980;
            border: 2px solid #543847;
            padding: 1.5rem;
            border-radius: 8px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .score-label {
            font-size: 1rem;
            color: #e45f1b;
            text-transform: uppercase;
            font-weight: 900;
            -webkit-text-stroke: 1px #543847;
        }

        .score-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffffff;
            -webkit-text-stroke: 2px #543847;
        }

        .new-best {
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 900;
            position: absolute;
            top: -12px;
            background: #ff0000;
            padding: 2px 8px;
            border: 2px solid #ffffff;
            border-radius: 10px;
            display: none;
        }
        .new-best.active {
            display: block;
        }

        .instructions {
            margin-top: 1.5rem;
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
            -webkit-text-stroke: 1px #000;
            max-width: 350px;
            text-align: center;
            line-height: 1.5;
        }

    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="hud">0</div>

            <!-- Start Screen -->
            <div id="start-screen" class="screen active">
                <div class="title">FLAPPY<br>BIRD</div>
                <button class="play-btn" id="start-btn">START</button>
                <div class="instructions">Tap, Click, or press Space to flap. Don't hit the pipes!</div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="screen">
                <div class="panel">
                    <div class="game-over-title">GAME OVER</div>
                    <div class="score-box">
                        <div class="score-item">
                            <span class="score-label">Score</span>
                            <span class="score-value" id="final-score">0</span>
                        </div>
                        <div class="score-item" style="position:relative;">
                            <div class="new-best" id="new-best-badge">NEW</div>
                            <span class="score-label">Best</span>
                            <span class="score-value" id="best-score">0</span>
                        </div>
                    </div>
                    <button class="play-btn" id="restart-btn" style="background: #e45f1b;">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Setup Canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        // UI Elements
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const hud = document.getElementById('hud');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreEl = document.getElementById('final-score');
        const bestScoreEl = document.getElementById('best-score');
        const newBestBadge = document.getElementById('new-best-badge');

        // Dynamic Sizing
        let width, height;
        function resize() {
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State
        const STATE = {
            START: 0,
            PLAYING: 1,
            GAMEOVER: 2
        };

        let currentState = STATE.START;
        let frames = 0;
        let score = 0;
        let bestScore = localStorage.getItem('flappyBestScore_nopixel') || 0;

        // Constants
        const GRAVITY = 0.25;
        const JUMP = -6;
        const SPEED = 3.5; // Slightly faster to handle wide screens well
        const PIPE_WIDTH = 90; // Thicker pipes for full screen
        let PIPE_GAP = 200; // Increased base gap slightly to compensate
        
        // Input Handling
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if(e.type === 'keydown' && e.code === 'Space') e.preventDefault();

            switch (currentState) {
                case STATE.START:
                    startGame();
                    break;
                case STATE.PLAYING:
                    bird.flap();
                    break;
                case STATE.GAMEOVER:
                    if (e.type === 'keydown' && frames - gameOverFrame > 30) {
                        resetGame();
                    }
                    break;
            }
        }

        window.addEventListener('keydown', handleInput);
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', resetGame);

        let gameOverFrame = 0;

        function startGame() {
            if (currentState !== STATE.START) return;
            currentState = STATE.PLAYING;
            startScreen.classList.remove('active');
            hud.classList.add('active');
            score = 0;
            hud.innerText = score;
            pipes.reset();
            bird.reset();
        }

        function resetGame() {
            if (currentState !== STATE.GAMEOVER) return;
            currentState = STATE.START;
            gameOverScreen.classList.remove('active');
            startScreen.classList.add('active');
            bird.reset();
            frames = 0;
            background.offset = 0;
            pipes.reset();
        }

        function gameOver() {
            currentState = STATE.GAMEOVER;
            gameOverFrame = frames;
            hud.classList.remove('active');
            gameOverScreen.classList.add('active');
            
            finalScoreEl.innerText = score;
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBestScore_nopixel', bestScore);
                newBestBadge.classList.add('active');
            } else {
                newBestBadge.classList.remove('active');
            }
            bestScoreEl.innerText = bestScore;
        }

        // Entities
        const bird = {
            animation: [0, 1, 2, 1],
            animIndex: 0,
            x: 0,
            y: 0,
            radius: 20,
            velocity: 0,
            rotation: 0,

            reset() {
                this.x = width * 0.2; // Keep it on the left side of screen
                this.y = height / 2;
                this.velocity = 0;
                this.rotation = 0;
            },

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Body (Original yellow)
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fce235'; // Bright yellow
                ctx.fill();
                
                // Bird outline
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#000000';
                ctx.stroke();

                // Eye white
                ctx.beginPath();
                ctx.arc(8, -8, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.stroke();

                // Black eye pupil
                ctx.beginPath();
                ctx.arc(11, -8, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#000000';
                ctx.fill();

                // Orange Beak
                ctx.beginPath();
                ctx.moveTo(10, 2);
                ctx.lineTo(26, 2);
                ctx.lineTo(24, 12);
                ctx.lineTo(10, 10);
                ctx.closePath();
                ctx.fillStyle = '#fa7914'; // Orange beak
                ctx.fill();
                ctx.stroke();

                // Beak cut line
                ctx.beginPath();
                ctx.moveTo(10, 6);
                ctx.lineTo(25, 6);
                ctx.strokeStyle = '#000000';
                ctx.stroke();

                // Wing
                let wingY = this.animIndex === 1 ? 0 : (this.animIndex === 0 ? 5 : -5);
                ctx.beginPath();
                ctx.ellipse(-6, 2 + wingY, 10, 6, -Math.PI / 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            },

            flap() {
                this.velocity = JUMP;
            },

            update() {
                let period = currentState === STATE.PLAYING ? 6 : 10;
                if (frames % period === 0) {
                    this.animIndex = (this.animIndex + 1) % this.animation.length;
                }

                if (currentState === STATE.START) {
                    this.y = height / 2 + Math.cos(frames / 15) * 6;
                    this.rotation = 0;
                } else {
                    this.velocity += GRAVITY;
                    this.y += this.velocity;

                    if (this.velocity < JUMP + 2) {
                        this.rotation = -25 * Math.PI / 180;
                    } else {
                        this.rotation += 3.5 * Math.PI / 180;
                        if (this.rotation > 90 * Math.PI / 180) {
                            this.rotation = 90 * Math.PI / 180;
                        }
                    }

                    // Floor collision
                    if (this.y + this.radius >= height - 90) { // Height minus floor ground height
                        this.y = height - 90 - this.radius;
                        if (currentState === STATE.PLAYING) gameOver();
                    }

                    // Ceiling collision
                    if (this.y - this.radius <= 0) {
                        this.y = this.radius;
                        this.velocity = 0;
                    }
                }
            }
        };

        const pipes = {
            position: [],
            
            reset() {
                this.position = [];
            },

            draw() {
                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    
                    let topYPos = p.y;
                    let bottomYPos = p.y + PIPE_GAP;
                    
                    ctx.save();
                    
                    // Pipe base color
                    const pipeColor = '#74c029'; // Classic green
                    const outlineColor = '#543847';
                    
                    // Highlight mapping
                    const linearGradient = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
                    linearGradient.addColorStop(0, '#59a224');
                    linearGradient.addColorStop(0.2, '#9de659');
                    linearGradient.addColorStop(0.3, pipeColor);
                    linearGradient.addColorStop(1, '#478519');

                    ctx.fillStyle = linearGradient;
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = outlineColor;

                    // Helper to draw a pipe correctly with no pixelation
                    function drawPipeSegment(x, y, w, h, isCap) {
                        ctx.beginPath();
                        ctx.rect(x, y, w, h);
                        ctx.fill();
                        ctx.stroke();
                    }

                    // Top Pipe
                    drawPipeSegment(p.x, 0, PIPE_WIDTH, topYPos);
                    // Top Pipe Cap
                    drawPipeSegment(p.x - 6, topYPos - 30, PIPE_WIDTH + 12, 30);

                    // Bottom Pipe
                    drawPipeSegment(p.x, bottomYPos, PIPE_WIDTH, height - bottomYPos);
                    // Bottom Pipe Cap
                    drawPipeSegment(p.x - 6, bottomYPos, PIPE_WIDTH + 12, 30);

                    ctx.restore();
                }
            },

            update() {
                if (currentState !== STATE.PLAYING) return;

                // Adjust frequency based on screen width so they aren't too sparse or crowded
                // 120 is about right for a wide monitor, but let's base it on speed
                if (frames % 100 === 0) {
                    this.position.push({
                        x: width,
                        y: Math.random() * (height - 90 - PIPE_GAP - 120) + 60,
                        passed: false
                    });
                }

                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    p.x -= SPEED;
                    
                    let bottomYPos = p.y + PIPE_GAP;

                    // Collision Detection
                    let cx = bird.x;
                    let cy = bird.y;

                    // Using 0.7 padding for a slightly forgiving hitbox
                    let collisionRadius = bird.radius * 0.7;

                    let topRect = {x: p.x - 6, y: 0, w: PIPE_WIDTH + 12, h: p.y};
                    let bottomRect = {x: p.x - 6, y: bottomYPos, w: PIPE_WIDTH + 12, h: height - bottomYPos};

                    if (rectIntersectCircle(topRect, cx, cy, collisionRadius) || 
                        rectIntersectCircle(bottomRect, cx, cy, collisionRadius)) {
                        gameOver();
                    }

                    if (p.x + PIPE_WIDTH < bird.x && !p.passed) {
                        score += 1;
                        hud.innerText = score;
                        p.passed = true;
                        
                        hud.style.transform = 'scale(1.2)';
                        setTimeout(() => hud.style.transform = 'scale(1)', 100);
                        
                        if(score % 10 === 0 && PIPE_GAP > 140) {
                            PIPE_GAP -= 5; // make slightly harder over time
                        }
                    }

                    if (p.x + PIPE_WIDTH + 20 < 0) {
                        this.position.shift();
                        i--;
                    }
                }
            }
        };

        function rectIntersectCircle(rect, cx, cy, cr) {
            let distX = Math.abs(cx - rect.x - rect.w / 2);
            let distY = Math.abs(cy - rect.y - rect.h / 2);

            if (distX > (rect.w / 2 + cr)) { return false; }
            if (distY > (rect.h / 2 + cr)) { return false; }

            if (distX <= (rect.w / 2)) { return true; } 
            if (distY <= (rect.h / 2)) { return true; }

            let dx = distX - rect.w / 2;
            let dy = distY - rect.h / 2;
            return (dx * dx + dy * dy <= (cr * cr));
        }

        // Environment Background
        const background = {
            offset: 0,
            draw() {
                // Clouds
                ctx.save();
                ctx.fillStyle = '#ffffff';
                let cloudOffset = this.offset * 0.2 % 1500;
                for (let x = -1500; x < width + 1500; x += 300) {
                    let drawX = x - cloudOffset;
                    ctx.beginPath();
                    ctx.arc(drawX + 50, height - 180, 40, 0, Math.PI * 2);
                    ctx.arc(drawX + 100, height - 190, 60, 0, Math.PI * 2);
                    ctx.arc(drawX + 160, height - 170, 50, 0, Math.PI * 2);
                    ctx.rect(drawX + 50, height - 180, 110, 50);
                    ctx.fill();
                }

                // City silhouette / Trees (Green hills in original game)
                ctx.fillStyle = '#a1e479'; // Lighter green for back hills
                let hillOffsetB = this.offset * 0.4 % 800;
                for(let x = -800; x < width + 800; x += 400) {
                    let drawX = x - hillOffsetB;
                    ctx.beginPath();
                    ctx.moveTo(drawX, height - 90);
                    ctx.arc(drawX + 200, height - 90, 180, Math.PI, 0);
                    ctx.lineTo(drawX + 400, height - 90);
                    ctx.fill();
                }

                ctx.fillStyle = '#73bf2e'; // Darker green for front hills
                let hillOffsetF = this.offset * 0.6 % 600;
                for(let x = -600; x < width + 600; x += 300) {
                    let drawX = x - hillOffsetF;
                    ctx.beginPath();
                    ctx.moveTo(drawX, height - 90);
                    ctx.arc(drawX + 150, height - 60, 150, Math.PI, 0);
                    ctx.lineTo(drawX + 300, height - 90);
                    ctx.fill();
                }

                // Ground Floor (Classic strip)
                let groundOffset = this.offset % 30; // Tile width
                ctx.fillStyle = '#ded895'; // Sandy beige
                ctx.fillRect(0, height - 90, width, 90);

                // Ground lines details
                ctx.fillStyle = '#73bf2e'; // Grass rim
                ctx.fillRect(0, height - 90, width, 20);
                
                ctx.strokeStyle = '#543847';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, height - 90);
                ctx.lineTo(width, height - 90);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, height - 70);
                ctx.lineTo(width, height - 70);
                ctx.stroke();

                // Diagonal ground lines
                ctx.strokeStyle = '#d0ca83';
                ctx.lineWidth = 4;
                for (let x = -groundOffset; x < width; x += 30) {
                    ctx.beginPath();
                    ctx.moveTo(x, height - 70);
                    ctx.lineTo(x - 20, height);
                    ctx.stroke();
                }

                ctx.restore();
            },
            update() {
                if (currentState === STATE.PLAYING || currentState === STATE.START) {
                    this.offset += SPEED;
                }
            }
        };

        // Draw Function
        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            background.draw();
            pipes.draw();
            bird.draw();
        }

        // Update Function
        function update() {
            bird.update();
            background.update();
            pipes.update();
            
            if (currentState === STATE.PLAYING) {
                frames++;
            }
        }

        // Game Loop
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Start Up
        bird.reset();
        requestAnimationFrame(loop);

    </script>
</body>
</html>
