<style>
    body,
    html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
        width: 100%;
        background-color: #70c5ce;
        /* Sky blue */
    }

    #game-container {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
    }

    canvas {
        display: block;
    }
</style>
<script>
    // Adjust canvas for full screen without stretching
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        width = canvas.width;
        height = canvas.height;
        bird.reset();
        pipes.reset();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Bird colors
    bird.draw = function () {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        // Body
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#FFEE00'; // Bright yellow
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Eye
        ctx.beginPath();
        ctx.arc(8, -8, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(10, -8, 2, 0, Math.PI * 2);
        ctx.fillStyle = '#000';
        ctx.fill();

        // Beak
        ctx.beginPath();
        ctx.moveTo(10, 2);
        ctx.lineTo(22, 2);
        ctx.lineTo(20, 10);
        ctx.lineTo(10, 10);
        ctx.closePath();
        ctx.fillStyle = '#FF9900'; // Orange
        ctx.fill();
        ctx.stroke();

        // Wing
        ctx.beginPath();
        ctx.ellipse(-6, 2, 8, 5, -Math.PI / 8, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.stroke();

        ctx.restore();
    };

    // Pipes colors
    pipes.draw = function () {
        for (let p of this.position) {
            ctx.save();
            // Top Pipe
            ctx.fillStyle = '#5CB85C'; // Green
            ctx.fillRect(p.x, 0, PIPE_WIDTH, p.y);
            ctx.strokeStyle = '#3E8E3E';
            ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.y);

            // Bottom Pipe
            ctx.fillStyle = '#5CB85C';
            ctx.fillRect(p.x, p.y + PIPE_GAP, PIPE_WIDTH, height - (p.y + PIPE_GAP));
            ctx.strokeStyle = '#3E8E3E';
            ctx.strokeRect(p.x, p.y + PIPE_GAP, PIPE_WIDTH, height - (p.y + PIPE_GAP));
            ctx.restore();
        }
    };

    // Ground colors
    background.draw = function () {
        ctx.fillStyle = '#70c5ce';
        ctx.fillRect(0, 0, width, height);

        // Hills (original Flappy Bird style)
        ctx.fillStyle = '#a1e479';
        ctx.fillRect(0, height - 90, width, 30);

        // Ground
        ctx.fillStyle = '#DED895';
        ctx.fillRect(0, height - 60, width, 60);

        ctx.fillStyle = '#73BF2E';
        ctx.fillRect(0, height - 60, width, 10);

        // Simple cloud
        ctx.fillStyle = '#fff';
        for (let x = -50; x < width; x += 200) {
            ctx.beginPath();
            ctx.arc(x + 50, height - 250, 20, 0, 2 * Math.PI);
            ctx.arc(x + 80, height - 240, 25, 0, 2 * Math.PI);
            ctx.arc(x + 120, height - 250, 20, 0, 2 * Math.PI);
            ctx.fill();
        }
    };
</script>
